name: subway_commute_widget
description: 출퇴근 시간대 자동 스위칭 한국 지하철 홈 위젯
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Network
  dio: ^5.4.0
  json_annotation: ^4.8.1

  # Local Storage
  shared_preferences: ^2.2.2

  # Home Widget
  home_widget: ^0.4.1

  # Utils
  logger: ^2.0.2+1
  intl: ^0.18.1

  # Font
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  custom_lint: ^0.5.7
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true
  assets:
    - assets/data/

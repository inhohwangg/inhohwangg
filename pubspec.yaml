name: video_audio_converter
description: A Flutter app to convert video files to audio files.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  file_picker: ^6.1.1
  ffmpeg_kit_flutter_full_gpl: ^6.0.3
  permission_handler: ^11.3.0
  path_provider: ^2.1.2
  path: ^1.9.0
  share_plus: ^7.2.2
  flutter_spinkit: ^5.2.0
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
